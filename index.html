<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Global POS System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 400px; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; font-size: 1.5rem; color: #0f172a; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; flex: 1; font-size: 1rem; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-cash { background: #64748b; color: white; width: 100%; margin-top: 10px; }
        .btn-card { background: var(--success); color: white; width: 100%; margin-top: 10px; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .total { font-size: 2rem; font-weight: 800; text-align: right; margin: 20px 0; color: #0f172a; }
        #status-tag { text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; background: #f1f5f9; }
        @media print { body * { visibility: hidden; } #receipt-print, #receipt-print * { visibility: visible; } #receipt-print { position: absolute; top: 0; left: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📦 Добавление товара</h2>
        <div class="input-group">
            <input type="text" id="in-name" placeholder="Название товара">
            <input type="number" id="in-price" placeholder="Цена">
            <button class="btn btn-add" onclick="addItem()">Добавить</button>
        </div>
        <div id="cart-items">
            </div>
    </div>

    <div class="card">
        <h2>💰 Оплата</h2>
        <div class="total" id="total-display">0 ₽</div>
        <button class="btn btn-card" onclick="payByCard()">💳 ОПЛАТА КАРТОЙ</button>
        <button class="btn btn-cash" onclick="payByCash()">💵 НАЛИЧНЫЕ</button>
        <div id="status-tag" style="margin-top:20px">КАССА ГОТОВА</div>
    </div>
</div>

<div id="receipt-print" style="display:none; font-family: monospace; padding: 20px; width: 300px;">
    <center>
        <h3>МОЙ МАГАЗИН</h3>
        <p>ЧЕК ПРОДАЖИ</p>
        <hr>
        <div id="r-items"></div>
        <hr>
        <h2 id="r-total"></h2>
        <p>Тип оплаты: <span id="r-type"></span></p>
        <p>Дата: <span id="r-date"></span></p>
        <p>СПАСИБО ЗА ПОКУПКУ!</p>
    </center>
</div>

<script>
    const S_URL = 'https://shswkhgwrxsulqqczbjj.supabase.co';
    const S_KEY = 'ВСТАВЬ_СВОЙ_КЛЮЧ_ANON_ЗДЕСЬ';
    const supabase = window.supabase.createClient(S_URL, S_KEY);
    
    let cart = [];
    let total = 0;
    const TID = 'STATION_01';

    function addItem() {
        const name = document.getElementById('in-name').value;
        const price = parseFloat(document.getElementById('in-price').value);
        if(!name || !price) return;

        cart.push({name, price});
        total += price;
        render();
        document.getElementById('in-name').value = '';
        document.getElementById('in-price').value = '';
    }

    function render() {
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div class="cart-item"><span>${i.name}</span><b>${i.price} ₽</b></div>
        `).join('');
        document.getElementById('total-display').innerText = total + " ₽";
    }

    async function payByCard() {
        if(total === 0) return;
        document.getElementById('status-tag').innerText = "⏳ ОЖИДАНИЕ ТЕРМИНАЛА...";
        await supabase.from('sessions').upsert({ id: TID, total: total, status: 'paying', cart: cart });
        
        // Ждем сигнал от терминала
        supabase.channel('kassa').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'sessions', filter: `id=eq.${TID}` }, (p) => {
            if(p.new.status === 'success') finish('КАРТА');
        }).subscribe();
    }

    function payByCash() {
        if(total === 0) return;
        const given = prompt("Внесено наличных:", total);
        if(given >= total) {
            alert("Сдача: " + (given - total) + " ₽");
            finish('НАЛИЧНЫЕ');
        }
    }

    function finish(type) {
        document.getElementById('r-items').innerHTML = cart.map(i => `<div>${i.name} ... ${i.price}₽</div>`).join('');
        document.getElementById('r-total').innerText = total + " ₽";
        document.getElementById('r-type').innerText = type;
        document.getElementById('r-date').innerText = new Date().toLocaleString();
        window.print();
        location.reload();
    }
</script>
</body>
</html>
