<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Терминал оплаты</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .terminal { background: #ffffff; width: 350px; border-radius: 24px; padding: 40px; text-align: center; }
        .display { background: #1e293b; color: #10b981; padding: 30px; border-radius: 12px; font-size: 2rem; font-family: monospace; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1.2rem; box-sizing: border-box; text-align: center; }
        .btn-pay { width: 100%; padding: 15px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="display" id="screen">ВСТАВЬТЕ КАРТУ</div>
    <div id="ui" style="display:none">
        <input type="text" id="card" placeholder="НОМЕР КАРТЫ">
        <input type="password" id="pin" placeholder="PIN">
        <button class="btn-pay" onclick="doPay()">ПОДТВЕРДИТЬ</button>
    </div>
</div>

<script>
    const S_URL = 'https://shswkhgwrxsulqqczbjj.supabase.co';
    const S_KEY = 'ВСТАВЬ_СВОЙ_КЛЮЧ_ANON_ЗДЕСЬ';
    const sb = supabase.createClient(S_URL, S_KEY);
    const TID = 'STATION_01';

    sb.channel('term').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'sessions', filter: `id=eq.${TID}` }, (p) => {
        if(p.new.status === 'paying') {
            document.getElementById('screen').innerText = p.new.total + " ₽";
            document.getElementById('ui').style.display = 'block';
        }
    }).subscribe();

    async function doPay() {
        const c = document.getElementById('card').value;
        const p = document.getElementById('pin').value;
        const { data: bank } = await sb.from('bank').select('*').eq('card_num', c).single();
        const { data: sess } = await sb.from('sessions').select('*').eq('id', TID).single();

        if(bank && bank.pin === p && bank.balance >= sess.total) {
            await sb.from('bank').update({ balance: bank.balance - sess.total }).eq('card_num', c);
            await sb.from('sessions').update({ status: 'success' }).eq('id', TID);
            document.getElementById('screen').innerText = "✅ ГОТОВО";
            document.getElementById('ui').style.display = 'none';
        } else {
            alert("Ошибка! Проверьте данные или баланс.");
        }
    }
</script>
</body>
</html>
