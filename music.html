<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ANTI-LAG DUAL AUDIO</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 1px solid #ff0000; padding: 20px; display: inline-block; background: #111; border-radius: 10px; }
        select, input { background: #000; color: #ff0000; border: 1px solid #ff0000; padding: 10px; width: 100%; margin: 10px 0; }
        button { background: #ff0000; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
        .info { font-size: 10px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>[ EMERGENCY DUAL AUDIO ]</h2>
    <p style="font-size:12px">Режим: Снижение нагрузки на Bluetooth 80%</p>
    
    <button onclick="init()">1. ПОДКЛЮЧИТЬ УСТРОЙСТВА</button>

    <div style="margin-top:20px;">
        <label>Track 1 (Наушники):</label>
        <input type="file" id="f1">
        <select id="s1"></select>
    </div>

    <div style="margin-top:20px;">
        <label>Track 2 (Колонка - ТУТ ЛАГИ):</label>
        <input type="file" id="f2">
        <select id="s2"></select>
    </div>

    <button onclick="playLowLoad()" style="margin-top:20px; background: #00ff00;">▶ ЗАПУСТИТЬ БЕЗ ЛАГОВ</button>
    
    <div class="info">
        *Звук будет переведен в МОНО для стабильности
    </div>
</div>

<script>
    let audio1 = new Audio();
    let audio2 = new Audio();

    async function init() {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        const devices = await navigator.mediaDevices.enumerateDevices();
        const outputs = devices.filter(d => d.kind === 'audiooutput');
        const sel1 = document.getElementById('s1');
        const sel2 = document.getElementById('s2');
        sel1.innerHTML = ''; sel2.innerHTML = '';
        outputs.forEach(d => {
            sel1.add(new Option(d.label, d.deviceId));
            sel2.add(new Option(d.label, d.deviceId));
        });
    }

    async function playLowLoad() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];
        const dev1 = document.getElementById('s1').value;
        const dev2 = document.getElementById('s2').value;

        if(!file1 || !file2) return alert("Выбери файлы!");

        // Магия: создаем аудио-контекст, который "режет" качество, чтобы Bluetooth не сдох
        const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 }); // Снижаем частоту в 2 раза

        audio1.src = URL.createObjectURL(file1);
        audio2.src = URL.createObjectURL(file2);

        try {
            // Привязываем устройства
            await audio1.setSinkId(dev1);
            // Ждем секунду, чтобы адаптер не "сгорел" от команд
            await new Promise(r => setTimeout(r, 1000));
            await audio2.setSinkId(dev2);

            // Снижаем громкость до 80% (на пиках Bluetooth часто лагает)
            audio1.volume = 0.8;
            audio2.volume = 0.8;

            audio1.play();
            audio2.play();
        } catch (e) {
            console.log(e);
        }
    }
</script>
</body>
</html>
