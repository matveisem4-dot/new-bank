<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dual Audio PC - Stable Version</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .player-card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; }
        select, input { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: none; background: #404040; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-init { background: #3498db; color: white; }
        .btn-play { background: #2ecc71; color: white; font-size: 1.2em; }
        .btn-play:disabled { background: #555; cursor: not-allowed; }
        .track-box { border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        h2 { text-align: center; color: #2ecc71; margin-top: 0; }
        #debug { background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 11px; margin-top: 15px; width: 450px; box-sizing: border-box; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>JS Dual Audio PC</h2>
    
    <button class="btn-init" onclick="getAudioDevices()">1. НАЙТИ BLUETOOTH УСТРОЙСТВА</button>
    <p id="status" style="font-size: 12px; color: #aaa; text-align: center;">Подключите колонку и наушники к Windows</p>

    <div class="track-box">
        <label>Трек 1 (Наушники):</label>
        <input type="file" id="file1" accept="audio/*">
        <select id="select1"><option value="">Выбор...</option></select>
    </div>

    <div class="track-box">
        <label>Трек 2 (Колонка):</label>
        <input type="file" id="file2" accept="audio/*">
        <select id="select2"><option value="">Выбор...</option></select>
    </div>

    <button id="playBtn" class="btn-play" onclick="playSimultaneously()">▶ ЗАПУСТИТЬ ОДНОВРЕМЕННО</button>
</div>

<div id="debug">System: Жду инициализации...</div>

<script>
    const audio1 = new Audio();
    const audio2 = new Audio();
    const dbg = document.getElementById('debug');

    function log(msg) {
        const t = new Date().toLocaleTimeString();
        dbg.innerHTML += `<div>[${t}] ${msg}</div>`;
        dbg.scrollTop = dbg.scrollHeight;
    }

    async function getAudioDevices() {
        try {
            log("Запрос прав доступа...");
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outputs = devices.filter(d => d.kind === 'audiooutput');

            const s1 = document.getElementById('select1');
            const s2 = document.getElementById('select2');
            s1.innerHTML = ''; s2.innerHTML = '';

            outputs.forEach(d => {
                const name = d.label || `Device ${d.deviceId.substring(0,5)}`;
                s1.add(new Option(name, d.deviceId));
                s2.add(new Option(name, d.deviceId));
            });

            log("Устройства загружены.");
            document.getElementById('status').innerText = "Готово! Выберите устройства.";
        } catch (err) {
            log("Ошибка: " + err.message);
        }
    }

    async function playSimultaneously() {
        const f1 = document.getElementById('file1').files[0];
        const f2 = document.getElementById('file2').files[0];
        const dev1 = document.getElementById('select1').value;
        const dev2 = document.getElementById('select2').value;

        if (!f1 || !f2 || !dev1 || !dev2) {
            alert("Выбери 2 файла и 2 устройства!");
            return;
        }

        document.getElementById('playBtn').disabled = true;

        try {
            log("Подготовка потока 1...");
            audio1.src = URL.createObjectURL(f1);
            await audio1.setSinkId(dev1);
            log("Поток 1 привязан.");

            // ПАУЗА 500мс для Bluetooth-адаптера
            log("Пауза для стабилизации Bluetooth...");
            await new Promise(r => setTimeout(r, 500));

            log("Подготовка потока 2...");
            audio2.src = URL.createObjectURL(f2);
            await audio2.setSinkId(dev2);
            log("Поток 2 привязан.");

            log("Синхронный старт...");
            await Promise.all([audio1.play(), audio2.play()]);
            log("Воспроизведение запущено!");

        } catch (e) {
            log("КРИТИЧЕСКАЯ ОШИБКА: " + e.message);
            alert("Ошибка! Попробуйте еще раз. Если колонка отключается — Windows блокирует второй поток.");
        } finally {
            document.getElementById('playBtn').disabled = false;
        }
    }
</script>
</body>
</html>
