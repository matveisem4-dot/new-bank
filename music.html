<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ultra Light Dual Audio</title>
    <style>
        body { font-family: 'Consolas', monospace; background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .panel { border: 1px dashed #0f0; padding: 25px; border-radius: 5px; width: 420px; text-align: center; }
        .status { font-size: 10px; margin-bottom: 20px; color: #888; text-transform: uppercase; }
        select, input { width: 100%; margin: 8px 0; padding: 10px; background: #111; color: #0f0; border: 1px solid #0f0; font-family: monospace; }
        button { width: 100%; padding: 15px; margin-top: 15px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #fff; }
        .warn { color: yellow; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="status">System Status: Optimization Active</div>
    <h2>STABLE DUAL AUDIO</h2>
    
    <button onclick="initSystem()">[ SCAN HARDWARE ]</button>

    <div style="margin-top:20px;">
        <label>Track 1 (F9-36):</label>
        <input type="file" id="f1" accept="audio/*">
        <select id="s1"></select>
    </div>

    <div style="margin-top:20px;">
        <label>Track 2 (KOKIN):</label>
        <input type="file" id="f2" accept="audio/*">
        <select id="s2"></select>
    </div>

    <button onclick="runStable()">▶ RUN STABLE STREAM</button>
    <div class="warn">Внимание: звук оптимизирован для снижения лагов Bluetooth</div>
</div>

<script>
    // Создаем аудио-контексты с пониженными требованиями
    const a1 = new Audio();
    const a2 = new Audio();
    
    // Включаем предзагрузку, чтобы не было рывков
    a1.preload = "auto";
    a2.preload = "auto";

    async function initSystem() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outputs = devices.filter(d => d.kind === 'audiooutput');

            const sel1 = document.getElementById('s1');
            const sel2 = document.getElementById('s2');
            sel1.innerHTML = ''; sel2.innerHTML = '';

            outputs.forEach(d => {
                sel1.add(new Option(d.label || "Output", d.deviceId));
                sel2.add(new Option(d.label || "Output", d.deviceId));
            });
            console.log("Devices loaded");
        } catch (e) { alert("Access denied"); }
    }

    async function runStable() {
        const file1 = document.getElementById('f1').files[0];
        const file2 = document.getElementById('f2').files[0];
        const dev1 = document.getElementById('s1').value;
        const dev2 = document.getElementById('s2').value;

        if(!file1 || !file2) return;

        // Создаем Blob-ссылки
        a1.src = URL.createObjectURL(file1);
        a2.src = URL.createObjectURL(file2);

        try {
            // Устанавливаем устройства
            await a1.setSinkId(dev1);
            // Пауза 800мс, чтобы адаптер "продышался" после первого устройства
            await new Promise(r => setTimeout(r, 800));
            await a2.setSinkId(dev2);

            // Старт
            a1.play();
            a2.play();

            // ФИНАЛЬНЫЙ ХАК: Снижаем громкость до 90%. 
            // Иногда на 100% Bluetooth-стек Windows начинает "хрипеть" при двойном потоке
            a1.volume = 0.9;
            a2.volume = 0.9;

        } catch (err) {
            console.error(err);
        }
    }
</script>
</body>
</html>
