<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dual Bluetooth JS Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .player-card { background: #2d2d2d; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 450px; }
        select, input { width: 100%; margin: 10px 0; padding: 12px; border-radius: 5px; border: none; background: #404040; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-init { background: #3498db; color: white; }
        .btn-play { background: #2ecc71; color: white; font-size: 1.2em; }
        .btn-play:hover { background: #27ae60; }
        .track-box { border-bottom: 1px solid #444; padding-bottom: 15px; margin-bottom: 15px; }
        h2 { text-align: center; color: #2ecc71; }
    </style>
</head>
<body>

<div class="player-card">
    <h2>JS Dual Audio PC</h2>
    
    <button class="btn-init" onclick="getAudioDevices()">1. НАЙТИ BLUETOOTH УСТРОЙСТВА</button>
    <p id="status" style="font-size: 12px; color: #aaa; text-align: center;">Подключите колонки в Windows и нажмите кнопку выше</p>

    <div class="track-box">
        <label>Песня 1:</label>
        <input type="file" id="file1" accept="audio/*">
        <select id="select1"><option value="">Выбор колонки №1...</option></select>
    </div>

    <div class="track-box">
        <label>Песня 2:</label>
        <input type="file" id="file2" accept="audio/*">
        <select id="select2"><option value="">Выбор колонки №2...</option></select>
    </div>

    <button class="btn-play" onclick="playSimultaneously()">▶ ЗАПУСТИТЬ ОДНОВРЕМЕННО</button>
</div>

<script>
    const audioContext1 = new Audio();
    const audioContext2 = new Audio();

    async function getAudioDevices() {
        try {
            // Запрашиваем доступ, чтобы увидеть названия (labels) устройств
            await navigator.mediaDevices.getUserMedia({ audio: true });
            const devices = await navigator.mediaDevices.enumerateDevices();
            const outputs = devices.filter(device => device.kind === 'audiooutput');

            const s1 = document.getElementById('select1');
            const s2 = document.getElementById('select2');
            s1.innerHTML = ''; 
            s2.innerHTML = '';

            outputs.forEach(device => {
                const label = device.label || `Device ${device.deviceId.substring(0,5)}`;
                s1.add(new Option(label, device.deviceId));
                s2.add(new Option(label, device.deviceId));
            });

            document.getElementById('status').innerText = "Готово! Выберите файлы и устройства.";
            document.getElementById('status').style.color = "#2ecc71";
        } catch (err) {
            alert("Ошибка: Разрешите доступ к микрофону, чтобы браузер увидел список Bluetooth.");
        }
    }

    async function playSimultaneously() {
        const f1 = document.getElementById('file1').files[0];
        const f2 = document.getElementById('file2').files[0];
        const dev1 = document.getElementById('select1').value;
        const dev2 = document.getElementById('select2').value;

        if (!f1 || !f2 || !dev1 || !dev2) {
            alert("Нужно выбрать 2 файла и 2 разных устройства!");
            return;
        }

        // Подготавливаем источники
        audioContext1.src = URL.createObjectURL(f1);
        audioContext2.src = URL.createObjectURL(f2);

        try {
            // Направляем потоки на разные Bluetooth ID (SinkId)
            // Это работает в Chrome/Edge на Windows
            await audioContext1.setSinkId(dev1);
            await audioContext2.setSinkId(dev2);

            // Синхронный запуск
            audioContext1.play();
            audioContext2.play();
        } catch (e) {
            console.error(e);
            alert("Ошибка воспроизведения. Убедитесь, что устройства активны.");
        }
    }
</script>
</body>
</html>
